<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scroll animations Demo</title>

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- https://www.youtube.com/watch?v=UmzFk68Bwdk -->
    <!-- https://www.youtube.com/watch?v=16PncZlSNds -->

    <!-- https://www.joshwcomeau.com/animation/scroll-driven-animations/?from=newsletter -->

    <!-- 1 -->
    <div class="readingIndicator"></div>

    <main>
      <div class="left">
        <!-- 2 -->
        <div class="images" display="flex" flex-direction="column" gap="1rem">
          <img
            alt="A capybara sleeping peacefully on the grass"
            src="./images/a.jpg"
          />
          <img
            alt="A capybara chewing on some vegetation, with some white birds in the background"
            src="./images/b.jpg"
          />
          <img
            alt="A baby capybara walking on top of an adult capybara"
            src="./images/c.jpg"
          />
          <img
            alt="A close-up shot of a capybara, with a human nearby"
            src="images/d.jpg"
          />
        </div>
      </div>

      <div class="right">
        <!-- 3 -->
        <div class="right-col_left">
          <div class="square"></div>
        </div>
        <div class="right-col_right">
          <p class="content">← A square appears!</p>
        </div>
      </div>
    </main>
  </body>
</html>
